server {
    listen 80;
    listen [::]:80;
    server_name formfiller.ai-workflows.cloud;

    root /home/ashok/projects/form_filler;
    index index.html index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Block direct access to composer files
    location ~ /composer\.(json|lock)$ {
        deny all;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    access_log /var/log/nginx/formfiller_access.log;
    error_log  /var/log/nginx/formfiller_error.log;
}
