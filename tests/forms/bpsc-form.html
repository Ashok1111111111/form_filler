<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>BPSC Style Form</title></head>
<body>
<h2>BPSC/SSC Government Job Application</h2>
<form id="testForm">
  <input id="firstName" name="firstName" placeholder="First Name">
  <input id="middleName" name="middleName" placeholder="Middle Name">
  <input id="lastName" name="lastName" placeholder="Last Name / Surname">
  <input id="fullName" name="fullName" placeholder="Full Name as per Aadhaar">
  <input id="fatherName" name="fatherName" placeholder="Father's Name">
  <input id="motherName" name="motherName" placeholder="Mother's Name">
  <input type="date" id="dob" name="dob">
  <select id="gender" name="gender"><option value="">--</option><option>Male</option><option>Female</option><option>Transgender</option></select>
  <select id="category" name="category"><option value="">--</option><option>General</option><option>OBC</option><option>OBC-NCL</option><option>SC</option><option>ST</option><option>EWS</option></select>
  <select id="religion" name="religion"><option value="">--</option><option>Hindu</option><option>Muslim</option><option>Christian</option><option>Sikh</option><option>Others</option></select>
  <select id="nationality" name="nationality"><option value="">--</option><option>Indian</option></select>
  <select id="maritalStatus" name="maritalStatus"><option value="">--</option><option>Unmarried</option><option>Married</option><option>Divorced</option><option>Widowed</option></select>
  <input id="emailId" name="emailId" type="email" placeholder="Email Address">
  <input id="confirmEmail" name="confirmEmail" type="email" placeholder="Confirm Email">
  <input id="mobileNumber" name="mobileNumber" placeholder="Mobile Number">
  <input id="confirmMobile" name="confirmMobile" placeholder="Confirm Mobile">
  <input id="aadhaarNumber" name="aadhaarNumber" placeholder="Aadhaar Number">
  <input id="panNumber" name="panNumber" placeholder="PAN Number">
  <input id="permAddr1" name="permAddr1" placeholder="Address Line 1">
  <input id="permAddr2" name="permAddr2" placeholder="Address Line 2">
  <input id="permDistrict" name="permDistrict" placeholder="District">
  <input id="permState" name="permState" placeholder="State">
  <input id="permPin" name="permPin" placeholder="PIN Code">
  <input id="tenthBoard" name="tenthBoard" placeholder="10th Board">
  <input id="tenthYear" name="tenthYear" placeholder="10th Passing Year">
  <input id="tenthPercent" name="tenthPercent" placeholder="10th Percentage">
  <input id="twelfthBoard" name="twelfthBoard" placeholder="12th Board">
  <input id="twelfthYear" name="twelfthYear" placeholder="12th Passing Year">
  <input id="gradDegree" name="gradDegree" placeholder="Graduation Degree">
  <input id="gradUniv" name="gradUniv" placeholder="University">
  <input id="gradYear" name="gradYear" placeholder="Passing Year">
  <input id="bankAcc" name="bankAcc" placeholder="Bank Account Number">
  <input id="bankIFSC" name="bankIFSC" placeholder="IFSC Code">
</form>
</body></html>
