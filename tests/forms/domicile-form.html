<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Domicile/Caste Certificate Form</title></head>
<body>
<h2>Domicile / Caste / Income Certificate Form</h2>
<form id="testForm">
  <input id="applicantName" name="applicantName" placeholder="Applicant Name / आवेदक का नाम">
  <input id="fatherName" name="fatherName" placeholder="Father's Name / पिता का नाम">
  <input id="motherName" name="motherName" placeholder="Mother's Name / माता का नाम">
  <input type="date" id="dob" name="dob">
  <select id="gender" name="gender"><option value="">--</option><option>Male</option><option>Female</option><option>Other</option></select>
  <select id="category" name="category"><option value="">--</option><option>General</option><option>OBC</option><option>OBC-NCL</option><option>SC</option><option>ST</option></select>
  <input id="mobileNumber" name="mobileNumber" placeholder="Mobile / मोबाइल">
  <input id="emailId" name="emailId" placeholder="Email / ईमेल">
  <input id="aadhaarNumber" name="aadhaarNumber" placeholder="Aadhaar No.">
  <input id="permAddr1" name="permAddr1" placeholder="House No., Village / मकान नं., ग्राम">
  <input id="permPO" name="permPO" placeholder="Post Office / डाकघर">
  <input id="permPS" name="permPS" placeholder="Police Station / थाना">
  <input id="permDistrict" name="permDistrict" placeholder="District / जिला">
  <input id="permState" name="permState" placeholder="State / राज्य">
  <input id="permPin" name="permPin" placeholder="PIN / पिनकोड">
  <input id="domicileCertNo" name="domicileCertNo" placeholder="Domicile Certificate No.">
  <input id="domicileIssueDate" name="domicileIssueDate" placeholder="Issue Date">
  <input id="domicileAuthority" name="domicileAuthority" placeholder="Issuing Authority">
  <input id="casteCertNo" name="casteCertNo" placeholder="Caste Certificate No.">
  <input id="casteIssueDate" name="casteIssueDate" placeholder="Caste Cert Issue Date">
  <input id="casteAuthority" name="casteAuthority" placeholder="Caste Issuing Authority">
  <input id="incomeCertNo" name="incomeCertNo" placeholder="Income Certificate No.">
  <input id="incomeIssueDate" name="incomeIssueDate" placeholder="Income Cert Issue Date">
  <input id="annualIncome" name="annualIncome" placeholder="Annual Income / वार्षिक आय">
</form>
</body></html>
