<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>IRCTC Style Form</title></head>
<body>
<h2>IRCTC / Railway Booking Form</h2>
<form id="testForm">
  <input id="firstName" name="firstName" placeholder="First Name">
  <input id="lastName" name="lastName" placeholder="Last Name">
  <input id="emailId" name="emailId" type="email" placeholder="Email ID">
  <input id="mobileNumber" name="mobileNumber" placeholder="Mobile Number">
  <select id="gender" name="gender"><option value="">--</option><option>Male</option><option>Female</option><option>Transgender</option></select>
  <input type="date" id="dob" name="dob" placeholder="Date of Birth">
  <input id="aadhaarNumber" name="aadhaarNumber" placeholder="Aadhaar Number">
  <input id="permAddr1" name="permAddr1" placeholder="Address">
  <input id="permPin" name="permPin" placeholder="PIN Code">
  <select id="permState" name="permState">
    <option value="">--Select State--</option>
    <option value="Bihar">Bihar</option>
    <option value="UP">Uttar Pradesh</option>
    <option value="Delhi">Delhi</option>
    <option value="Maharashtra">Maharashtra</option>
  </select>
  <input id="permDistrict" name="permDistrict" placeholder="City / District">
  <input id="panNumber" name="panNumber" placeholder="PAN Card">
  <select id="nationality" name="nationality"><option value="">--</option><option>Indian</option><option>Others</option></select>
  <input id="occupationHidden" name="occupation" placeholder="Occupation (should NOT be filled)">
  <input id="organizationHidden" name="organization" placeholder="Organization (should NOT be filled)">
</form>
</body></html>
