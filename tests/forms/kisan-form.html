<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>PM Kisan / Khatian Form</title></head>
<body>
<h2>PM-KISAN / Khatian Village Form (Hindi Labels)</h2>
<form id="testForm">
  <input id="applicantName" name="applicantName" placeholder="आवेदक का नाम (Applicant Name)">
  <input id="fatherHusband" name="fatherHusband" placeholder="पिता / पति का नाम (Father/Husband Name)">
  <input id="mobileNo" name="mobileNo" placeholder="मोबाइल नंबर (Mobile No.)">
  <input id="aadhaarNo" name="aadhaarNo" placeholder="आधार संख्या (Aadhaar No.)">
  <select id="genderSelect" name="genderSelect">
    <option value="">लिंग चुनें / Select Gender</option>
    <option value="Male">पुरुष / Male</option>
    <option value="Female">महिला / Female</option>
  </select>
  <input type="date" id="dobField" name="dobField" placeholder="जन्म तिथि (DOB)">
  <select id="categoryField" name="categoryField">
    <option value="">जाति वर्ग / Category</option>
    <option value="General">सामान्य / General</option>
    <option value="OBC">अन्य पिछड़ा वर्ग / OBC</option>
    <option value="OBC-NCL">OBC-NCL</option>
    <option value="SC">अनुसूचित जाति / SC</option>
    <option value="ST">अनुसूचित जनजाति / ST</option>
  </select>
  <input id="villageField" name="villageField" placeholder="ग्राम / Village">
  <input id="postOffice" name="postOffice" placeholder="डाकघर / Post Office">
  <input id="thanaField" name="thanaField" placeholder="थाना / Police Station">
  <input id="districtField" name="districtField" placeholder="जिला / District">
  <input id="stateField" name="stateField" placeholder="राज्य / State">
  <input id="pincodeField" name="pincodeField" placeholder="पिन कोड / PIN Code">
  <input id="bankAccount" name="bankAccount" placeholder="बैंक खाता संख्या / Bank Account">
  <input id="ifscCode" name="ifscCode" placeholder="IFSC कोड">
  <input id="bankNameField" name="bankNameField" placeholder="बैंक का नाम / Bank Name">
  <input id="emailAddress" name="emailAddress" type="email" placeholder="ईमेल / Email">
  <input id="casteCertNo" name="casteCertNo" placeholder="जाति प्रमाण पत्र क्रमांक / Caste Cert No.">
  <input id="incomeCertNo" name="incomeCertNo" placeholder="आय प्रमाण पत्र क्रमांक / Income Cert No.">
  <input id="domicileCertNo" name="domicileCertNo" placeholder="निवास प्रमाण पत्र / Domicile Cert No.">
</form>
</body></html>
